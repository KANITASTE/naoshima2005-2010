<div id="second_line">
<h2>犬島観光イラスト紀行</h2>
</div>
<div id="main_contents">

<img src="img/illust/01.gif" border="0" usemap="#Map" />
<map name="Map" id="Map"><area shape="rect" coords="69,12,531,268" alt="高松発　四国汽船8時12発　直島までは50分。観光の下調べとか、船内探検とかうとうとしてたりするとあっという間に直島宮浦美奈と到着。私はほぼ徹夜だったので、乗船後すぐに寝てしまい、気がついたら直島。昔の宮浦港は恐ろしいほど何も無くて、ひどく心細かったのだけど、今では立派な案内所も出来てとても不思議。あのバス停ひとつの港も見知らぬ土地に降り立ったとゆーのを演出しているかのよーで良かったのだけどね" />
<area shape="rect" coords="30,764,571,1029" alt="宮浦港発　犬島行き9時25分　海から港に向かって左手にある小型船乗り場に。30人のりのラブバード号。運賃は片道2000円！私のほかにはカップル1組と女の子ひとりと2人組。私の前の席にカップルが座ったのだけど、美男美女。船の中で2人して前髪にカーラー巻いていたのが可愛かった。美男美女はやっぱり色々気をつかっているのかしらね。小型船は瀬戸内海のディープな海域を40分。途中海の上に猫がたくさん丸まっているのが見えて「何だ何だ！」と思ったら丸くて大きなブイがたくさん浮いているだけだった。定置網かなー？" />
<area shape="rect" coords="32,1267,517,1392" alt="犬島着10時5分　港の目の前がチケットセンンター。黒い建物はのどかな島で異質な感じもしたけれど、最初に置いたオセロの駒みたいに、これから広がるシンボリックな雰囲気むんむん。予兆を抱える黒い建物。　" />
<area shape="rect" coords="38,1413,512,1464" alt="冬の平日朝イチのツアーだったので、たぶん私を含めて5組ぐらいだろうなーと思っていたら団体ツアーが入っていて仰天。私は甘かった…" />
</map>
<img src="img/illust/02.gif" border="0" usemap="#Map2" />
<map name="Map2" id="Map2"><area shape="rect" coords="50,9,537,125" alt="犬島ツアー10時20分　ツアーのメンバーは船で一緒だったカップル＆女子ひとり＆2人組。ちなみにツアーは事前予約制（3日前まで)で1,000円。カフェスペースの奥から出発" />
<area shape="rect" coords="63,334,542,566" alt="鉄柵のゲートを入り精錬所エリアに。真っ黒なレンガの壁が連なる、重苦しくも作られただけではない歴史という下地が醸し上げる荘厳なイントロダクション。黒光りするレンガはかつてこの精錬所が操業していた時に銅の精錬過程で副産物として作られたカラミれんがというもの。鉄や銅を含むためやたらと重く、壊れやすい。けれども、まじまじとカラミレンガを見ると様々な形、色を持ち、表情豊かでそのひとつ自体が作品として完成しているようにも見えてしまう。" />
<area shape="rect" coords="66,1804,528,1970" alt="その後の2部屋は1つは小さな作品、もうひとつは大きな作品だけどWebなどでも写真がでているので割愛。というか最初の作品が印象深すぎてその後の2作品はフレンチフルコース後のお茶漬けみたいになってしまった感が。まーとにかくケンカしてでも最初の一歩を踏み出しましょう。" />
<area shape="rect" coords="44,1726,366,1787" alt="これはグループの人とケンカしてでも一番最初に歩くべき" />
<area shape="rect" coords="70,686,538,952" alt="カラミレンガのゾーンをぬけて近代化産業遺産のゾーンに。草木の中をわさわさと。廃墟ブームももう落ち着いたけど、軍艦島しかり、モノを生み出していた廃墟って圧倒的。ここで何がどう流れていたのか、そういうことをまわりながら想像すると、ふと頭に再現できる瞬間があって、階段の横を工員がすり抜けていくような錯覚する覚える。銅の精錬は相当に過酷だったはず。多くの人が日々汗水たらし幸せを思い働いて。たった100年前の出来事は、今、あとかたもなく朽ちてしまった。私たちの日々も思いも、いつか同じように朽ちてしまうことを思うと、この廃墟も未来の姿に見えてならない。" />
<area shape="rect" coords="45,1106,555,1177" alt="さて次は精錬所。建築家「三分一博志」氏とアーティスト「柳幸典」氏のコラボレーション。" />
<area shape="rect" coords="59,1324,545,1480" alt="室内作品は3つあるのだけど、最初の作品、じれが久しぶりに「ぞっと」とした作品だった。真っ黒な通路の先に光りが見える。それに向かって歩く。それだけ。けれども誰も歩を進めず躊躇。どういうわけか進んで良いのかわからない気持ちにさせる。" />
<area shape="rect" coords="65,1490,546,1718" alt="じゃあ最初歩いてもらえますか？とグループの先頭にいた私が促されてｔ第一歩。轟々と風を切る音が突き落とされて落ちていくような音に聞こえてひどく不安にさせられる。光はやけに遠く感じるし、光の先には風景らしきものひとつ見えない。真っ暗で狭い通路から光りに向かって進んでいると自分が産道を通る胎児になったようで、その先が恐ろしくも嬉しくも感じる。右にも左にも振れない奇妙な高揚感。" />
</map>
<img src="img/illust/03.gif" border="0" usemap="#Map3" />
<map name="Map3" id="Map3"><area shape="rect" coords="29,736,573,824" alt="犬島発　宮浦港行き　13時5分　なんと！帰りの船は貸し切り状態！これじゃあ片道2千円でも仕方がないのかなぁ" />
<area shape="rect" coords="37,434,520,578" href="#" alt="おなかが減ったのでチケットセンター内のカフェで「たこめし」7百円。曲げわっぱに入った甘めに味付けされたたこめしが美味しい！タコはふんわり柔らか。三つ葉と針生姜がアクセントになって上品な億品。お昼に丁度よかった。" />
<area shape="rect" coords="40,12,532,248" alt="ツアー終了。乗船まで。　ツアー終了後、1時間ばかり時間が出来たので海岸を歩いてビーチコーミング。百年前に栄えた地だから、明治あたりの陶片があるかなと思っていたけど、成果は紙刷印判の小さなカケラがひとつ。でも犬島らしいお土産となりそうなものが！カラミレンガのかけら！真っ黒なカラミレンガのカケラが浜にたくさん。2つ大きさと形が良いものを選んでお土産に。" />
</map>
